version: "3.9"

services:
  localstack:
    container_name: smaran-localstack
    image: localstack/localstack:4
    ports:
      - "4566:4566" # all-in-one edge port
    environment:
      # Default region for every AWS service LocalStack emulates.
      - DEFAULT_REGION=eu-central-1
      - AWS_DEFAULT_REGION=eu-central-1
      # Services smaran needs (more added as constructs land).
      - SERVICES=cognito-idp,dynamodb,appsync,lambda,iam,cloudformation,sts,secretsmanager
      # Persistence — survives container restarts.
      - PERSISTENCE=1
      - DEBUG=0
    volumes:
      - "./.localstack:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
