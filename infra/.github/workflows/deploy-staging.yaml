name: deploy-staging

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/deploy-staging.yaml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

# Staging deploys run sequentially — never cancel a deploy that's
# mid-flight, just let the next commit queue up.
concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  diff:
    name: cdk diff (smaran-staging)
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: infra
    env:
      AWS_ROLE_TO_ASSUME: arn:aws:iam::139316820779:role/github-actions-smaran-deploy
      AWS_REGION: eu-central-1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: infra/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('infra/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-
      - name: Install
        run: npm ci
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Diff
        # `cdk diff` is read-only; we run it as a separate job so
        # the diff is visible in the Actions UI / PR checks even
        # before the deploy job fires.
        run: npx cdk diff smaran-staging-eu-central-1 --quiet

  deploy:
    name: deploy smaran-staging
    runs-on: ubuntu-latest
    needs: diff
    environment:
      name: staging
      # No `url:` — staging has no public URL until Phase 5+ lands.
    defaults:
      run:
        working-directory: infra
    env:
      AWS_ROLE_TO_ASSUME: arn:aws:iam::139316820779:role/github-actions-smaran-deploy
      AWS_REGION: eu-central-1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: infra/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('infra/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-
      - name: Install
        run: npm ci
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy
        run: |
          npx cdk deploy \
            smaran-staging-eu-central-1 \
            --require-approval never \
            --outputs-file cdk-outputs.json
