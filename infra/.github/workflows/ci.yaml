name: ci

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/ci.yaml"
  workflow_dispatch:

# Least-privilege: ci only needs to read the repo and run build steps.
# No AWS credentials required — the deploy workflows handle AWS access.
permissions:
  contents: read

# Cancel an in-flight CI run for the same PR when a new commit is
# pushed. Saves CI minutes; the new commit's run supersedes the old.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build-and-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: infra/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('infra/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npx jest --ci

      - name: Synth (sandbox, staging, prod, local)
        # `cdk synth` doesn't need AWS credentials; it just walks the
        # tree and emits CloudFormation. Catches template errors
        # before a real deploy.
        env:
          CDK_DEFAULT_ACCOUNT: "000000000000"
          CDK_DEFAULT_REGION: eu-central-1
        run: |
          npx cdk synth smaran-sandbox-eu-central-1 --quiet
          npx cdk synth smaran-staging-eu-central-1 --quiet
          npx cdk synth smaran-production-eu-central-1 --quiet
