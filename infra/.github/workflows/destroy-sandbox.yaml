name: destroy-sandbox

on:
  # Fires when a PR is closed (merged OR just closed without merge).
  # In both cases the sandbox stack is no longer needed and should
  # be destroyed — that's the whole point of the DESTROY retention
  # policy on every sandbox resource.
  pull_request:
    types: [closed]
    paths:
      - "infra/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

# No concurrency group: we WANT a destroy to run even if a deploy
# is in flight (closing a PR mid-deploy is a real scenario).
concurrency:
  group: destroy-sandbox-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  destroy:
    name: destroy pr-${{ github.event.pull_request.number }}-smaran-sandbox
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true || github.event.pull_request.merged == false
    # The `if` ensures we don't accidentally fire on a push event
    # (PRs only). Note: `pull_request.merged` is `false` for closed
    # without merge, `true` for merged, and absent for other PR
    # events — `== true || == false` is a safe way to express
    # "the PR is closed in any way".
    environment: sandbox
    defaults:
      run:
        working-directory: infra
    env:
      CDK_STACK_PREFIX: pr-${{ github.event.pull_request.number }}
      AWS_ROLE_TO_ASSUME: arn:aws:iam::219602461448:role/github-actions-smaran-deploy
      AWS_REGION: eu-central-1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: infra/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('infra/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check if stack exists
        # `cdk destroy` errors if the stack doesn't exist. PRs that
        # failed to deploy (e.g. first-commit synth error) have no
        # stack — skip them gracefully.
        id: check
        run: |
          if aws cloudformation describe-stacks \
            --stack-name pr-${{ github.event.pull_request.number }}-smaran-sandbox-eu-central-1 \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Destroy
        if: steps.check.outputs.exists == 'true'
        # `--force` skips the confirmation prompt (we already gated
        # the workflow behind `if: closed`). All resources in the
        # stack carry `removalPolicy: DESTROY`, so the destroy
        # takes everything with it.
        run: |
          npx cdk destroy \
            pr-${{ github.event.pull_request.number }}-smaran-sandbox-eu-central-1 \
            --force
