name: build-mobile

# Build the production Android APK via Expo Application Services (EAS).
# Triggers on every push to main (and on manual dispatch). The finished
# APK is uploaded as a GitHub Actions artifact (30-day retention).
#
# This workflow does NOT deploy to the Play Store — it just produces a
# signed APK you can sideload or upload manually.
#
# --- One-time setup (do these once per repo before first run) -------
# 1. Create an Expo account: https://expo.dev/signup
# 2. From the `mobile/` directory on your laptop:
#      npm install -g eas-cli
#      eas login
#      eas init                 # creates the EAS project + adds
#                               # `extra.eas.projectId` to app.config.ts
#      eas build:configure      # creates mobile/eas.json (the profile
#                               # shape below already matches ours)
# 3. Generate an EAS access token:
#      https://expo.dev/accounts/<your-account>/settings/access-tokens
# 4. Add it as a GitHub Actions secret named EXPO_TOKEN:
#      Settings → Secrets and variables → Actions → New repository secret
# --------------------------------------------------------------------

on:
  # Note: do NOT add `branches: [main]` here. workflow_run's branches
  # filter checks the branch where the ci workflow FILE lives — for PR
  # runs that's the PR's HEAD branch, not `main`. The `if:` on the
  # build-android job below already filters out PR runs.
  workflow_run:
    workflows: [ci]
    types: [completed]

# No concurrency group: EAS builds run on Expo's servers, not here.
# Cancelling this workflow does NOT cancel an in-flight EAS build, and
# concurrent builds let you iterate without serialising on green ticks.

jobs:
  build-android:
    name: build Android APK via EAS
    # Push-to-main ci runs only — PR runs go through deploy-sandbox.
    if: github.event.workflow_run.conclusion == 'success' && !github.event.workflow_run.pull_requests[0]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Cache npm (mobile)
        uses: actions/cache@v5
        with:
          path: mobile/node_modules
          key: npm-mobile-${{ runner.os }}-${{ hashFiles('mobile/package-lock.json') }}
          restore-keys: npm-mobile-${{ runner.os }}-

      - name: Install (mobile)
        working-directory: mobile
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Trigger EAS build
        working-directory: mobile
        env:
          # Skip EAS's interactive VCS remote check (the `eas build:view`
          # link it adds is noise here).
          EAS_NO_VCS: '1'
        run: |
          eas build \
            --platform android \
            --profile production \
            --non-interactive \
            --wait \
            --env SMARAN_ENV=prod

      - name: Download APK
        working-directory: mobile
        # `build:download` with no --id grabs the most recent finished
        # build for the current project on this branch.
        run: eas build:download --output ./smaran.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v7
        with:
          name: smaran-android-apk
          path: mobile/smaran.apk
          # v7 supports single-file direct uploads — the artifact is the
          # .apk itself (no zip wrapper), so users get a directly
          # installable file from the GitHub Actions UI.
          archive: false
          if-no-files-found: error
          retention-days: 30
