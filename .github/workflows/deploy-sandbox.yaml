name: deploy-sandbox

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Per-PR concurrency: only one deploy runs per PR at a time, and a
# fresh push cancels the previous in-flight one.
concurrency:
  group: deploy-sandbox-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    name: deploy ${{ github.event.pull_request.number || 'manual' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    environment: sandbox
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Cache npm
        uses: actions/cache@v5
        with:
          path: infra/node_modules
          key: npm-infra-${{ runner.os }}-${{ hashFiles('infra/package-lock.json') }}
          restore-keys: npm-infra-${{ runner.os }}-

      - name: Install
        run: npm ci

      - name: Assume OIDC role
        uses: ./.github/actions/assume-deployer
        with:
          session_suffix: 'sandbox-deploy'

      - name: Resolve PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=manual" >> "$GITHUB_OUTPUT"
          fi

      - name: cdk deploy
        env:
          # `infra/bin/smaran.ts` reads CDK_STACK_PREFIX and, if set,
          # prefixes the sandbox stack name (`pr1-smaran-sandbox`)
          # so concurrent PR sandboxes don't collide. Without this,
          # CDK synthesises `smaran-sandbox` while the workflow
          # tries to deploy `pr1-smaran-sandbox` → "No stacks match".
          CDK_STACK_PREFIX: pr${{ steps.pr.outputs.number }}
        run: |
          npx cdk deploy \
            pr${{ steps.pr.outputs.number }}-smaran-sandbox-eu-central-1 \
            --require-approval never \
            --outputs-file cdk-outputs.json

      - name: Expose sandbox outputs
        if: success()
        run: |
          if [ -f cdk-outputs.json ]; then
            echo "## Sandbox outputs" >> "$GITHUB_STEP_SUMMARY"
            cat cdk-outputs.json >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Write mobile config
        if: success()
        uses: ./.github/actions/write-mobile-config
        with:
          stack_name: pr${{ steps.pr.outputs.number }}-smaran-sandbox-eu-central-1
          env_code: pr
          output_filename: pr-${{ steps.pr.outputs.number }}.json
