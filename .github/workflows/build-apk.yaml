name: build-apk

# On-demand Android APK for any environment's deployed backend, so it
# can be sideloaded onto a phone. Manual (workflow_dispatch) rather than
# per-deploy to stay within EAS free-tier build limits.
#
# Environment → stack/account mapping lives in .github/deploy-envs.json.
# The config job fetches live stack outputs; eas-build reusable workflow
# submits the EAS build.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Which deployed backend to build against.'
        required: true
        type: choice
        options: [sandbox, staging, production]
      pr_number:
        description: 'PR number — required for sandbox only (e.g. 4 for pr4-smaran-sandbox).'
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: build-apk-${{ inputs.environment }}-${{ inputs.pr_number }}
  cancel-in-progress: true

jobs:
  config:
    name: fetch ${{ inputs.environment }} config
    runs-on: ubuntu-latest
    outputs:
      profile: ${{ steps.resolve.outputs.profile }}
      config_env: ${{ steps.resolve.outputs.config_env }}
    steps:
      - uses: actions/checkout@v7

      - name: Resolve env settings
        id: resolve
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const env = process.env.ENVIRONMENT;
          const pr = process.env.PR_NUMBER ?? '';
          const cfg = JSON.parse(fs.readFileSync('.github/deploy-envs.json', 'utf8'));
          const entry = cfg[env];
          if (!entry) {
            console.error(`unknown environment: ${env}`);
            process.exit(1);
          }
          if (entry.requires_pr_number && !pr) {
            console.error('pr_number is required for sandbox');
            process.exit(1);
          }
          const stack = entry.stack.replaceAll('{pr_number}', pr);
          const out = process.env.GITHUB_OUTPUT;
          fs.appendFileSync(out, `account=${entry.account}\n`);
          fs.appendFileSync(out, `stack=${stack}\n`);
          fs.appendFileSync(out, `profile=${entry.profile}\n`);
          fs.appendFileSync(out, `config_env=${entry.config_env}\n`);
          NODE

      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      - name: Configure AWS credentials (infra)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::126606499529:role/ap-github-actions-cdk
          aws-region: eu-central-1

      - name: Assume target lookup role
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ steps.resolve.outputs.account }}:role/cdk-hnb659fds-lookup-role-${{ steps.resolve.outputs.account }}-eu-central-1
          aws-region: eu-central-1
          role-chaining: true
          role-skip-session-tagging: true

      - name: Write mobile config from stack outputs
        working-directory: mobile
        env:
          STACK: ${{ steps.resolve.outputs.stack }}
          SMARAN_ENV: ${{ steps.resolve.outputs.config_env }}
        run: |
          node scripts/pull-config.mjs --stack "$STACK" --env "$SMARAN_ENV" --out "${SMARAN_ENV}.json"

      - name: Upload mobile config
        uses: actions/upload-artifact@v7
        with:
          name: mobile-config-${{ inputs.environment }}
          path: mobile/config/${{ steps.resolve.outputs.config_env }}.json
          if-no-files-found: error
          retention-days: 7

  build_android:
    needs: config
    uses: ayush-porwal/actions/.github/workflows/eas-build.yaml@feature/actions-improvements
    with:
      install-directory: .
      working-directory: mobile
      lockfile-path: package-lock.json
      eas-project-root: ${{ github.workspace }}
      config-directory: mobile/config
      config-artifact: mobile-config-${{ inputs.environment }}
      platform: android
      profile: ${{ needs.config.outputs.profile }}
      node-version: '24.x'
    secrets:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
