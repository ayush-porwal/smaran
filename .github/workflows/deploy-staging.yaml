name: deploy-staging

on:
  push:
    branches: [main]
  workflow_dispatch:

# No concurrency group: pushes to main are serial anyway, and
# rerunning the workflow on the same SHA is a deliberate retry.

jobs:
  deploy:
    name: deploy staging
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    environment: staging
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Cache npm
        uses: actions/cache@v5
        with:
          path: infra/node_modules
          key: npm-infra-${{ runner.os }}-${{ hashFiles('infra/package-lock.json') }}
          restore-keys: npm-infra-${{ runner.os }}-

      - name: Install
        run: npm ci

      - name: Assume OIDC role
        uses: ./.github/actions/assume-deployer
        with:
          session_suffix: 'staging-deploy'

      - name: cdk deploy
        run: npx cdk deploy smaran-staging-eu-central-1 --require-approval never --outputs-file cdk-outputs.json

      - name: Expose staging outputs
        if: success()
        run: |
          if [ -f cdk-outputs.json ]; then
            echo "## Staging outputs" >> "$GITHUB_STEP_SUMMARY"
            cat cdk-outputs.json >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Write mobile config
        if: success()
        uses: ./.github/actions/write-mobile-config
        with:
          stack_name: smaran-staging-eu-central-1
          env_code: staging
          output_filename: staging.json
