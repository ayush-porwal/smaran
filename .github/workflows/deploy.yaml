name: deploy

# Single deploy workflow for sandbox, staging, and prod —
# matches the efdigital/b2s-feedback-campaigns pattern.
#
# Auto-triggers AFTER `ci` completes:
#   - On a PR ci run → only the sandbox jobs run
#     (diff_sandbox + deploy_sandbox). Each PR gets its own
#     per-PR sandbox stack (`pr1-smaran-sandbox`,
#     `pr2-smaran-sandbox`, …) so concurrent previews don't
#     collide.
#   - On a push-to-main ci run → only the staging + prod jobs
#     run, but each deploy job pauses for human approval at
#     its `environment:` gate (configure required reviewers in
#     repo Settings → Environments).
#
# Manual override via `workflow_dispatch` for ad-hoc deploys
# (e.g. retrying a failed prod deploy).
#
# Job chain:
#   build → resolve →┬─ diff_sandbox → deploy_sandbox  (PR only)
#                    ├─ diff_staging → deploy_staging  (push/main or dispatch)
#                    └─ diff_prod → deploy_prod        (after deploy_staging)
on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  # --- CI gate (matches reference). Re-runs ci.yaml's checks
  # on the same SHA. workflow_run guarantees ci just succeeded,
  # but re-running catches pushes between the ci run and the
  # human approval. workflow_dispatch also re-runs as a safety
  # net. ---
  build:
    name: build, test, synth
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Cache npm (infra)
        uses: actions/cache@v5
        with:
          path: infra/node_modules
          key: npm-infra-${{ runner.os }}-${{ hashFiles('infra/package-lock.json') }}
          restore-keys: npm-infra-${{ runner.os }}-

      - name: Cache npm (mobile)
        uses: actions/cache@v5
        with:
          path: mobile/node_modules
          key: npm-mobile-${{ runner.os }}-${{ hashFiles('mobile/package-lock.json') }}
          restore-keys: npm-mobile-${{ runner.os }}-

      - name: Install (infra)
        working-directory: infra
        run: npm ci

      - name: Typecheck (infra)
        working-directory: infra
        run: npx tsc --noEmit

      - name: Test (infra)
        working-directory: infra
        run: npx jest --ci

      - name: Synth (infra)
        working-directory: infra
        run: npx cdk synth --quiet

      - name: Install (mobile)
        working-directory: mobile
        run: npm ci

      - name: Typecheck (mobile)
        working-directory: mobile
        run: npx tsc --noEmit

      - name: Lint (mobile)
        working-directory: mobile
        run: npm run lint

  # --- Context resolver: figures out which PR (for per-PR
  # sandbox) and whether this is a PR or push-to-main ci run.
  # workflow_dispatch has no PR context (manual runs deploy
  # to shared envs). ---
  resolve:
    name: resolve context
    needs: build
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      stack_prefix: ${{ steps.resolve.outputs.stack_prefix }}
      # "true" if this is a PR ci run (sandbox should deploy).
      # "false" if push-to-main or workflow_dispatch.
      is_pr_run: ${{ steps.resolve.outputs.is_pr_run }}
    steps:
      - name: Resolve context
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          {
            if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
              echo "pr_number=manual"
              echo "stack_prefix="
              echo "is_pr_run=false"
            else
              # workflow_run from ci. PR runs have a non-empty
              # `pull_requests` array; push-to-main runs have
              # an empty one.
              NUMBER=$(jq -r '.workflow_run.pull_requests[0].number // ""' "$GITHUB_EVENT_PATH")
              if [ -n "$NUMBER" ]; then
                echo "pr_number=$NUMBER"
                echo "stack_prefix=pr${NUMBER}-"
                echo "is_pr_run=true"
              else
                echo "pr_number="
                echo "stack_prefix="
                echo "is_pr_run=false"
              fi
            fi
          } >> "$GITHUB_OUTPUT"

  # --- Per-PR sandbox (PR ci runs only) ---
  diff_sandbox:
    name: cdk diff sandbox
    needs: resolve
    if: needs.resolve.outputs.is_pr_run == 'true'
    runs-on: ubuntu-latest
    environment: sandbox
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Cache npm
        uses: actions/cache@v5
        with:
          path: infra/node_modules
          key: npm-infra-${{ runner.os }}-${{ hashFiles('infra/package-lock.json') }}
          restore-keys: npm-infra-${{ runner.os }}-

      - name: Install
        run: npm ci

      - name: Assume OIDC role
        uses: ./.github/actions/assume-deployer
        with:
          session_suffix: 'sandbox-diff'

      - name: cdk diff
        env:
          CDK_STACK_PREFIX: ${{ needs.resolve.outputs.stack_prefix }}
        run: npx cdk diff ${CDK_STACK_PREFIX}smaran-sandbox-eu-central-1

  deploy_sandbox:
    name: cdk deploy sandbox
    needs: diff_sandbox
    if: needs.resolve.outputs.is_pr_run == 'true'
    runs-on: ubuntu-latest
    # Human-approval gate. Configure in:
    #   Settings → Environments → sandbox → Required reviewers
    environment: sandbox
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Cache npm
        uses: actions/cache@v5
        with:
          path: infra/node_modules
          key: npm-infra-${{ runner.os }}-${{ hashFiles('infra/package-lock.json') }}
          restore-keys: npm-infra-${{ runner.os }}-

      - name: Install
        run: npm ci

      - name: Assume OIDC role
        uses: ./.github/actions/assume-deployer
        with:
          session_suffix: 'sandbox-deploy'

      - name: cdk deploy
        env:
          # `infra/bin/smaran.ts` reads CDK_STACK_PREFIX; when set
          # it prefixes the sandbox stack (`pr1-smaran-sandbox`).
          CDK_STACK_PREFIX: ${{ needs.resolve.outputs.stack_prefix }}
        run: |
          npx cdk deploy \
            ${CDK_STACK_PREFIX}smaran-sandbox-eu-central-1 \
            --require-approval never \
            --outputs-file cdk-outputs.json

      - name: Expose sandbox outputs
        if: success()
        run: |
          if [ -f cdk-outputs.json ]; then
            echo "## Sandbox outputs" >> "$GITHUB_STEP_SUMMARY"
            cat cdk-outputs.json >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Write mobile config (sandbox)
        if: success()
        uses: ./.github/actions/write-mobile-config
        with:
          stack_name: ${{ needs.resolve.outputs.stack_prefix }}smaran-sandbox-eu-central-1
          env_code: pr
          output_filename: ${{ format('pr-{0}.json', needs.resolve.outputs.pr_number) }}

  # --- Staging (push-to-main ci runs + workflow_dispatch) ---
  diff_staging:
    name: cdk diff staging
    needs: resolve
    if: needs.resolve.outputs.is_pr_run != 'true'
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Cache npm
        uses: actions/cache@v5
        with:
          path: infra/node_modules
          key: npm-infra-${{ runner.os }}-${{ hashFiles('infra/package-lock.json') }}
          restore-keys: npm-infra-${{ runner.os }}-

      - name: Install
        run: npm ci

      - name: Assume OIDC role
        uses: ./.github/actions/assume-deployer
        with:
          session_suffix: 'staging-diff'

      - name: cdk diff
        run: npx cdk diff smaran-staging-eu-central-1

  deploy_staging:
    name: cdk deploy staging
    needs: diff_staging
    if: needs.resolve.outputs.is_pr_run != 'true'
    runs-on: ubuntu-latest
    # Human-approval gate. Configure required reviewers in:
    #   Settings → Environments → staging → Required reviewers
    environment: staging
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Cache npm
        uses: actions/cache@v5
        with:
          path: infra/node_modules
          key: npm-infra-${{ runner.os }}-${{ hashFiles('infra/package-lock.json') }}
          restore-keys: npm-infra-${{ runner.os }}-

      - name: Install
        run: npm ci

      - name: Assume OIDC role
        uses: ./.github/actions/assume-deployer
        with:
          session_suffix: 'staging-deploy'

      - name: cdk deploy
        run: npx cdk deploy smaran-staging-eu-central-1 --require-approval never --outputs-file cdk-outputs.json

      - name: Expose staging outputs
        if: success()
        run: |
          if [ -f cdk-outputs.json ]; then
            echo "## Staging outputs" >> "$GITHUB_STEP_SUMMARY"
            cat cdk-outputs.json >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Write mobile config (staging)
        if: success()
        uses: ./.github/actions/write-mobile-config
        with:
          stack_name: smaran-staging-eu-central-1
          env_code: staging
          output_filename: staging.json

  # --- Prod (only after staging succeeds, push-to-main or dispatch) ---
  diff_prod:
    name: cdk diff prod
    needs: deploy_staging
    if: needs.resolve.outputs.is_pr_run != 'true'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Cache npm
        uses: actions/cache@v5
        with:
          path: infra/node_modules
          key: npm-infra-${{ runner.os }}-${{ hashFiles('infra/package-lock.json') }}
          restore-keys: npm-infra-${{ runner.os }}-

      - name: Install
        run: npm ci

      - name: Assume OIDC role
        uses: ./.github/actions/assume-deployer
        with:
          session_suffix: 'prod-diff'

      - name: cdk diff
        run: npx cdk diff smaran-production-eu-central-1

  deploy_prod:
    name: cdk deploy prod
    needs: diff_prod
    if: needs.resolve.outputs.is_pr_run != 'true'
    runs-on: ubuntu-latest
    # Human-approval gate. Configure required reviewers in:
    #   Settings → Environments → production → Required reviewers
    environment: production
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Cache npm
        uses: actions/cache@v5
        with:
          path: infra/node_modules
          key: npm-infra-${{ runner.os }}-${{ hashFiles('infra/package-lock.json') }}
          restore-keys: npm-infra-${{ runner.os }}-

      - name: Install
        run: npm ci

      - name: Assume OIDC role
        uses: ./.github/actions/assume-deployer
        with:
          session_suffix: 'prod-deploy'

      - name: cdk deploy
        run: npx cdk deploy smaran-production-eu-central-1 --require-approval never --outputs-file cdk-outputs.json

      - name: Expose prod outputs
        if: success()
        run: |
          if [ -f cdk-outputs.json ]; then
            echo "## Prod outputs" >> "$GITHUB_STEP_SUMMARY"
            cat cdk-outputs.json >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Write mobile config (prod)
        if: success()
        uses: ./.github/actions/write-mobile-config
        with:
          stack_name: smaran-production-eu-central-1
          env_code: prod
          output_filename: prod.json
