name: deploy

# Push-to-main pipeline: staging → prod. Backend only — mobile APKs are
# built on demand via build-apk.yaml.
#
# PR CI (ci.yaml) must pass before merge — enforce via branch protection on
# main (see .github/BRANCH_PROTECTION.md). Staging and production deploys
# are gated by GitHub environment required reviewers. Diff jobs are ungated
# so a reviewer reads the plan before approving the deploy.
#
# Manual runs (`workflow_dispatch`) re-run infra CI first.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  ci:
    # Push to main assumes PR CI already passed (branch protection). Manual runs get a fresh gate.
    if: github.event_name == 'workflow_dispatch'
    uses: ayush-porwal/actions/.github/workflows/nodejs-cdk-ci.yaml@feature/actions-improvements
    with:
      install-directory: .
      working-directory: infra
      lockfile-path: package-lock.json
      npm-workspace: smaran-infra
      node-version: '24.x'
      lint: true
      format-check: true

  diff_staging:
    needs: ci
    # ci is skipped on push (!failure allows that); on workflow_dispatch ci must succeed first.
    if: always() && !cancelled() && !failure() && (github.event_name == 'push' || needs.ci.result == 'success')
    uses: ayush-porwal/actions/.github/workflows/nodejs-cdk-diff.yaml@feature/actions-improvements
    with:
      aws_role: arn:aws:iam::126606499529:role/ap-github-actions-cdk
      stack_name: smaran-staging-eu-central-1
      install-directory: .
      working-directory: infra
      lockfile-path: package-lock.json
      node-version: '24.x'

  deploy_staging:
    needs: diff_staging
    uses: ayush-porwal/actions/.github/workflows/nodejs-cdk-deploy.yaml@feature/actions-improvements
    with:
      aws_role: arn:aws:iam::126606499529:role/ap-github-actions-cdk
      stack_name: smaran-staging-eu-central-1
      environment: staging
      install-directory: .
      working-directory: infra
      lockfile-path: package-lock.json
      node-version: '24.x'

  diff_prod:
    needs: deploy_staging
    uses: ayush-porwal/actions/.github/workflows/nodejs-cdk-diff.yaml@feature/actions-improvements
    with:
      aws_role: arn:aws:iam::126606499529:role/ap-github-actions-cdk
      stack_name: smaran-production-eu-central-1
      install-directory: .
      working-directory: infra
      lockfile-path: package-lock.json
      node-version: '24.x'

  deploy_prod:
    needs: diff_prod
    uses: ayush-porwal/actions/.github/workflows/nodejs-cdk-deploy.yaml@feature/actions-improvements
    with:
      aws_role: arn:aws:iam::126606499529:role/ap-github-actions-cdk
      stack_name: smaran-production-eu-central-1
      environment: production
      install-directory: .
      working-directory: infra
      lockfile-path: package-lock.json
      node-version: '24.x'
