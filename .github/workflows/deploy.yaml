name: deploy

# Push-to-main pipeline: build → staging → prod (the reference chain).
# Backend only — mobile APKs are built on demand via build-sandbox-apk.yaml
# (and can be extended to staging/prod), fetching stack outputs directly.
#
# Staging and production deploys are gated by GitHub environment
# required reviewers. The diff jobs are ungated so a reviewer reads the
# plan before approving the deploy.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  # --- infra CI re-run: gate the whole chain on a green build -------
  build:
    uses: ayush-porwal/actions/.github/workflows/nodejs-cdk-ci.yaml@main
    with:
      working-directory: infra
      node-version: "24.x"

  # --- staging ------------------------------------------------------
  diff_staging:
    needs: build
    uses: ayush-porwal/actions/.github/workflows/nodejs-cdk-diff.yaml@main
    with:
      aws_role: arn:aws:iam::126606499529:role/ap-github-actions-cdk
      stack_name: smaran-staging-eu-central-1
      working-directory: infra
      node-version: "24.x"

  deploy_staging:
    needs: diff_staging
    uses: ayush-porwal/actions/.github/workflows/nodejs-cdk-deploy.yaml@main
    with:
      aws_role: arn:aws:iam::126606499529:role/ap-github-actions-cdk
      stack_name: smaran-staging-eu-central-1
      environment: staging
      working-directory: infra
      node-version: "24.x"

  # --- prod (after staging deploys) ---------------------------------
  diff_prod:
    needs: deploy_staging
    uses: ayush-porwal/actions/.github/workflows/nodejs-cdk-diff.yaml@main
    with:
      aws_role: arn:aws:iam::126606499529:role/ap-github-actions-cdk
      stack_name: smaran-production-eu-central-1
      working-directory: infra
      node-version: "24.x"

  deploy_prod:
    needs: diff_prod
    uses: ayush-porwal/actions/.github/workflows/nodejs-cdk-deploy.yaml@main
    with:
      aws_role: arn:aws:iam::126606499529:role/ap-github-actions-cdk
      stack_name: smaran-production-eu-central-1
      environment: production
      working-directory: infra
      node-version: "24.x"
