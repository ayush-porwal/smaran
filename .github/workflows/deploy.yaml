name: deploy

on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  # --- CI gate: re-runs the same checks as ci.yaml on the
  # same SHA the human is about to deploy. workflow_run already
  # guarantees ci just succeeded, but re-running catches the
  # case where someone pushed between the ci run and the
  # deploy approval. ---
  build:
    name: build, test, synth
    # workflow_run fires for PR and push-to-main; only run on
    # push-to-main ci completions. workflow_dispatch always runs.
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && !github.event.workflow_run.pull_requests[0])
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Cache npm (infra)
        uses: actions/cache@v5
        with:
          path: infra/node_modules
          key: npm-infra-${{ runner.os }}-${{ hashFiles('infra/package-lock.json') }}
          restore-keys: npm-infra-${{ runner.os }}-

      - name: Cache npm (mobile)
        uses: actions/cache@v5
        with:
          path: mobile/node_modules
          key: npm-mobile-${{ runner.os }}-${{ hashFiles('mobile/package-lock.json') }}
          restore-keys: npm-mobile-${{ runner.os }}-

      - name: Install (infra)
        working-directory: infra
        run: npm ci

      - name: Typecheck (infra)
        working-directory: infra
        run: npx tsc --noEmit

      - name: Test (infra)
        working-directory: infra
        run: npx jest --ci

      - name: Synth (infra)
        working-directory: infra
        run: npx cdk synth --quiet

      - name: Install (mobile)
        working-directory: mobile
        run: npm ci

      - name: Typecheck (mobile)
        working-directory: mobile
        run: npx tsc --noEmit

      - name: Lint (mobile)
        working-directory: mobile
        run: npm run lint

  # --- Staging: diff (no approval) then deploy (approval gate) ---
  diff_staging:
    name: cdk diff staging
    needs: build
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && !github.event.workflow_run.pull_requests[0])
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Cache npm
        uses: actions/cache@v5
        with:
          path: infra/node_modules
          key: npm-infra-${{ runner.os }}-${{ hashFiles('infra/package-lock.json') }}
          restore-keys: npm-infra-${{ runner.os }}-

      - name: Install
        run: npm ci

      - name: Assume OIDC role
        uses: ./.github/actions/assume-deployer
        with:
          session_suffix: 'staging-diff'

      - name: cdk diff
        run: npx cdk diff smaran-staging-eu-central-1

  deploy_staging:
    name: cdk deploy staging
    needs: diff_staging
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && !github.event.workflow_run.pull_requests[0])
    runs-on: ubuntu-latest
    # Human-approval gate. Configure in:
    #   Settings → Environments → staging → Required reviewers
    environment: staging
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Cache npm
        uses: actions/cache@v5
        with:
          path: infra/node_modules
          key: npm-infra-${{ runner.os }}-${{ hashFiles('infra/package-lock.json') }}
          restore-keys: npm-infra-${{ runner.os }}-

      - name: Install
        run: npm ci

      - name: Assume OIDC role
        uses: ./.github/actions/assume-deployer
        with:
          session_suffix: 'staging-deploy'

      - name: cdk deploy
        run: npx cdk deploy smaran-staging-eu-central-1 --require-approval never --outputs-file cdk-outputs.json

      - name: Expose staging outputs
        if: success()
        run: |
          if [ -f cdk-outputs.json ]; then
            echo "## Staging outputs" >> "$GITHUB_STEP_SUMMARY"
            cat cdk-outputs.json >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Write mobile config (staging)
        if: success()
        uses: ./.github/actions/write-mobile-config
        with:
          stack_name: smaran-staging-eu-central-1
          env_code: staging
          output_filename: staging.json

  # --- Prod: diff (no approval) then deploy (approval gate).
  # Prod only runs if staging deploy succeeded. ---
  diff_prod:
    name: cdk diff prod
    needs: deploy_staging
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && !github.event.workflow_run.pull_requests[0])
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Cache npm
        uses: actions/cache@v5
        with:
          path: infra/node_modules
          key: npm-infra-${{ runner.os }}-${{ hashFiles('infra/package-lock.json') }}
          restore-keys: npm-infra-${{ runner.os }}-

      - name: Install
        run: npm ci

      - name: Assume OIDC role
        uses: ./.github/actions/assume-deployer
        with:
          session_suffix: 'prod-diff'

      - name: cdk diff
        run: npx cdk diff smaran-production-eu-central-1

  deploy_prod:
    name: cdk deploy prod
    needs: diff_prod
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && !github.event.workflow_run.pull_requests[0])
    runs-on: ubuntu-latest
    # Human-approval gate. Configure required reviewers in:
    #   Settings → Environments → production → Required reviewers
    environment: production
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Cache npm
        uses: actions/cache@v5
        with:
          path: infra/node_modules
          key: npm-infra-${{ runner.os }}-${{ hashFiles('infra/package-lock.json') }}
          restore-keys: npm-infra-${{ runner.os }}-

      - name: Install
        run: npm ci

      - name: Assume OIDC role
        uses: ./.github/actions/assume-deployer
        with:
          session_suffix: 'prod-deploy'

      - name: cdk deploy
        run: npx cdk deploy smaran-production-eu-central-1 --require-approval never --outputs-file cdk-outputs.json

      - name: Expose prod outputs
        if: success()
        run: |
          if [ -f cdk-outputs.json ]; then
            echo "## Prod outputs" >> "$GITHUB_STEP_SUMMARY"
            cat cdk-outputs.json >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Write mobile config (prod)
        if: success()
        uses: ./.github/actions/write-mobile-config
        with:
          stack_name: smaran-production-eu-central-1
          env_code: prod
          output_filename: prod.json
