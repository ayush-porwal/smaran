name: deploy-prod

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you deploying to prod? (commit SHA, ticket, etc.)"
        required: true
        type: string

jobs:
  diff:
    name: cdk diff prod
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infra
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Cache npm
        uses: actions/cache@v5
        with:
          path: infra/node_modules
          key: npm-infra-${{ runner.os }}-${{ hashFiles('infra/package-lock.json') }}
          restore-keys: npm-infra-${{ runner.os }}-

      - name: Install
        run: npm ci

      - name: Assume OIDC role
        uses: ./.github/actions/assume-deployer
        with:
          session_suffix: 'prod-diff'

      - name: cdk diff
        run: npx cdk diff smaran-production-eu-central-1

  deploy:
    name: cdk deploy prod
    needs: diff
    runs-on: ubuntu-latest
    environment:
      name: production
    defaults:
      run:
        working-directory: infra
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Cache npm
        uses: actions/cache@v5
        with:
          path: infra/node_modules
          key: npm-infra-${{ runner.os }}-${{ hashFiles('infra/package-lock.json') }}
          restore-keys: npm-infra-${{ runner.os }}-

      - name: Install
        run: npm ci

      - name: Assume OIDC role
        uses: ./.github/actions/assume-deployer
        with:
          session_suffix: 'prod-deploy'

      - name: cdk deploy
        run: npx cdk deploy smaran-production-eu-central-1 --require-approval never --outputs-file cdk-outputs.json

      - name: Expose prod outputs
        if: success()
        run: |
          if [ -f cdk-outputs.json ]; then
            echo "## Prod outputs" >> "$GITHUB_STEP_SUMMARY"
            cat cdk-outputs.json >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Write mobile config
        if: success()
        uses: ./.github/actions/write-mobile-config
        with:
          stack_name: smaran-production-eu-central-1
          env_code: prod
          output_filename: prod.json
