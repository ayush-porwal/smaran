name: ci

# PR checks + gated sandbox deploy. Installs from the monorepo root (npm
# workspaces). Sandbox CDK diff+deploy runs only after CI passes and only
# when infra paths changed. Teardown stays in destroy-sandbox.yaml.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ci-${{ github.event.pull_request.head.label || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: detect path changes
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.manual.outputs.infra == 'true' || steps.filter.outputs.infra == 'true' || steps.filter.outputs.shared == 'true' }}
      mobile: ${{ steps.manual.outputs.mobile == 'true' || steps.filter.outputs.mobile == 'true' || steps.filter.outputs.shared == 'true' }}
    steps:
      - uses: actions/checkout@v7

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            infra:
              - 'infra/**'
              - '.github/workflows/**'
            mobile:
              - 'mobile/**'
              - '.github/workflows/**'
            shared:
              # Root lockfile / shared tooling — run both workspace checks when these change.
              - 'package.json'
              - 'package-lock.json'
              - 'turbo.json'
              - 'packages/**'
              - '.prettierrc.json'
              - '.prettierignore'
              - 'lint-staged.config.mjs'

      - name: Manual run — check all paths
        id: manual
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "infra=true" >> "$GITHUB_OUTPUT"
          echo "mobile=true" >> "$GITHUB_OUTPUT"

  format:
    name: format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - run: npm run format:check

  infra:
    name: infra — lint, build, test, synth
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.infra == 'true'
    uses: ayush-porwal/actions/.github/workflows/nodejs-cdk-ci.yaml@feature/actions-improvements
    with:
      install-directory: .
      working-directory: infra
      lockfile-path: package-lock.json
      npm-workspace: smaran-infra
      node-version: '24.x'
      lint: true

  mobile:
    name: mobile — typecheck, lint
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.mobile == 'true'
    uses: ayush-porwal/actions/.github/workflows/nodejs-ci.yaml@feature/actions-improvements
    with:
      install-directory: .
      lockfile-path: package-lock.json
      npm-workspace: smaran
      node-version: '24.x'

  deploy_sandbox:
    name: sandbox — diff + deploy
    needs: [changes, format, infra, mobile]
    # Infra-only PRs skip mobile — that's fine. Never deploy if format/infra failed.
    if: |
      github.event_name == 'pull_request' &&
      always() &&
      !cancelled() &&
      !contains(needs.*.result, 'failure') &&
      needs.changes.outputs.infra == 'true' &&
      needs.format.result == 'success' &&
      needs.infra.result == 'success' &&
      (needs.mobile.result == 'success' || needs.mobile.result == 'skipped')
    uses: ayush-porwal/actions/.github/workflows/nodejs-cdk-diff-deploy.yaml@feature/actions-improvements
    with:
      # Smaran-specific — reusable workflow stays generic; paths/stack/role live here.
      aws_role: arn:aws:iam::126606499529:role/ap-github-actions-cdk
      stack_name: pr${{ github.event.pull_request.number }}-smaran-sandbox-eu-central-1
      stack_prefix: pr${{ github.event.pull_request.number }}-
      environment: sandbox
      install-directory: .
      working-directory: infra
      lockfile-path: package-lock.json
      node-version: '24.x'
