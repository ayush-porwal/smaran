name: ci

# PR checks. Thin caller over the reusable workflows; mobile gets its
# own job (the reference is backend-only).

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.head.label || github.ref }}
  cancel-in-progress: true

jobs:
  infra:
    uses: ayush-porwal/actions/.github/workflows/nodejs-cdk-ci.yaml@main
    with:
      working-directory: infra
      node-version: "24.x"

  mobile:
    uses: ayush-porwal/actions/.github/workflows/nodejs-ci.yaml@main
    with:
      working-directory: mobile
      node-version: "24.x"
