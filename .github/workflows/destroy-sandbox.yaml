name: destroy-sandbox

# Tears down `pr{N}-smaran-sandbox-eu-central-1` when its PR closes
# (merged or not). On merge, the push to main separately triggers
# deploy.yaml (staging → prod), independent of this teardown.

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: read
  id-token: write

jobs:
  destroy_sandbox:
    uses: ayush-porwal/actions/.github/workflows/nodejs-cdk-destroy.yaml@main
    with:
      aws_role: arn:aws:iam::126606499529:role/ap-github-actions-cdk
      stack_name: pr${{ github.event.pull_request.number }}-smaran-sandbox-eu-central-1
      stack_prefix: pr${{ github.event.pull_request.number }}-
      environment: sandbox
      working-directory: infra
      node-version: '24.x'
