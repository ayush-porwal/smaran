name: Write mobile config
description: >
  Reads a `cdk-outputs.json` (produced by `cdk deploy --outputs-file`),
  pulls the given stack's outputs, and writes them to
  `mobile/config/{filename}` so the Expo build can pick them up at
  compile time via `app.config.ts`. All paths are resolved from the
  repo root (github.workspace), so it works regardless of the calling
  job's working-directory.
inputs:
  outputs_file:
    description: "Path (relative to repo root) to the cdk-outputs.json file."
    required: false
    default: "infra/cdk-outputs.json"
  stack_name:
    description: "CDK stack name to look up in cdk-outputs.json."
    required: true
  env_code:
    description: "envCode value to put in the config (staging, prod, pr, etc.)."
    required: true
  output_filename:
    description: "File name under mobile/config/ (e.g. staging.json, prod.json, pr-42.json)."
    required: true
runs:
  using: composite
  steps:
    - name: Write mobile/config/${{ inputs.output_filename }}
      shell: bash
      # Pass values as env vars rather than interpolating them into the
      # node -e string, so a stray quote in a stack name can't break the
      # inline JS.
      env:
        SMARAN_OUTPUTS_FILE: ${{ inputs.outputs_file }}
        SMARAN_STACK_NAME: ${{ inputs.stack_name }}
        SMARAN_ENV_CODE: ${{ inputs.env_code }}
        SMARAN_OUTPUT_FILENAME: ${{ inputs.output_filename }}
      run: |
        node -e '
          const fs = require("fs");
          const o = JSON.parse(fs.readFileSync(process.env.SMARAN_OUTPUTS_FILE, "utf8"));
          const s = o[process.env.SMARAN_STACK_NAME];
          if (!s) { console.error("no stack output for " + process.env.SMARAN_STACK_NAME); process.exit(1); }
          const cfg = {
            envCode: process.env.SMARAN_ENV_CODE,
            userPoolId: s["UserPoolId"],
            userPoolClientId: s["UserPoolClientId"],
            hostedUiDomain: s["HostedUiDomain"],
            graphqlEndpoint: s["GraphQLEndpoint"],
          };
          fs.mkdirSync("mobile/config", { recursive: true });
          fs.writeFileSync("mobile/config/" + process.env.SMARAN_OUTPUT_FILENAME, JSON.stringify(cfg, null, 2));
          console.log("wrote mobile/config/" + process.env.SMARAN_OUTPUT_FILENAME, cfg);
        '
